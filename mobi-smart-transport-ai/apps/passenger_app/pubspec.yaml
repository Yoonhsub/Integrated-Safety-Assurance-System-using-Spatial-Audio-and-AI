name: mobi_passenger_app
description: MOBI Passenger App skeleton.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  audioplayers: ^6.5.1
  # 클라이언트 측 Firebase 초기화용. 핵심 데모 데이터 쓰기는 백엔드 Admin SDK 가 담당하며,
  # 클라이언트 초기화는 lib/firebase_options.dart 생성 후 활성화된다(firebase_bootstrap.dart 참고).
  firebase_core: ^3.6.0
  flutter:
    sdk: flutter
  http: ^1.6.0
  flutter_tts: ^4.2.5
  geolocator: ^14.0.2
  shared_preferences: ^2.5.3
  speech_to_text: ^7.3.0
  mobi_mobile_sensors:
    path: ../../packages/mobile_sensors

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
